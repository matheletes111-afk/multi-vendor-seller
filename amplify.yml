version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm
        - echo "node-linker=hoisted" > .npmrc
        - echo "ignore-scripts=false" >> .npmrc
        - pnpm install
        - npx prisma generate
    build:
      commands:
        - pnpm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
