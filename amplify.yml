version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - corepack prepare pnpm@latest --activate
        - echo "node-linker=hoisted" > .npmrc
        - echo "ignore-scripts=false" >> .npmrc
        - echo "only-built-dependencies[]=prisma" >> .npmrc
        - echo "only-built-dependencies[]=@prisma/client" >> .npmrc
        - echo "only-built-dependencies[]=@prisma/engines" >> .npmrc
        - echo "only-built-dependencies[]=esbuild" >> .npmrc
        - echo "only-built-dependencies[]=sharp" >> .npmrc
        - pnpm install --no-frozen-lockfile
    build:
      commands:
        - npx prisma generate
        - pnpm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
