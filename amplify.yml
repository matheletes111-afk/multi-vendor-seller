version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm
        - pnpm install
        - npx prisma generate
    build:
      commands:
        - echo "Checking Environment Variables..."
        - env | grep -E "DATABASE_URL|NEXTAUTH_SECRET" || echo "Warning: Critical env vars missing"
        - pnpm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
